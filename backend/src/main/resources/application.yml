spring:
  application:
    name: project-pulse
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/projectpulse_dev}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:change-this-in-production-must-be-256-bits}
    token-expiry-in-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
