version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: projectpulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: projectpulse_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit
    container_name: projectpulse-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI at http://localhost:8025

volumes:
  mysql_data:
